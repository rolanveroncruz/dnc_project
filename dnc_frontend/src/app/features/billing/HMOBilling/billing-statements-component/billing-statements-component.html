<mat-card class="hmo-billings-card">
    <mat-card-header>
        <mat-card-title>HMO Billing Reports</mat-card-title>
        <mat-card-subtitle>
        </mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
        @if (hmo_billing_reports(); as ds) {
            @if (ds.length === 0) {
                <p>No Generated HMO Billing Reports.</p>
            } @else {
                <app-generic-data-table
                    [columnDefs]="HMOBillingReportColumns"
                    [data]="ds"
                    [pageSize]="20"
                    [pageSizeOptions]="[10, 20,25, 50, 100]"
                    (rowClicked)="downloadReport($event)"
                />
            }
        }
        <button
            mat-raised-button
            color="primary"
            type="button"
            class="generate-billing-btn"
            [disabled]="generatingBillingStatements()"
            (click)="generateHmoBillingStatements()">

            {{ generatingBillingStatements() ? 'Generating...' : 'Generate HMO Billing Statements' }}
        </button>
    </mat-card-content>
</mat-card>
