<mat-card class="hmo-billings-card">
    <mat-card-header>
        <mat-card-title>HMO Billing Reports</mat-card-title>
        <mat-card-subtitle>
            Choose an HMO to generate billing reports.
        </mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
        <div class="form-grid">

            <mat-form-field appearance="outline">
                <mat-label>HMO</mat-label>

                <mat-select
                    [value]="selected_hmo_id()"
                    (selectionChange)="onHmoSelected($event.value)"
                >
                    @for (hmo of hmos(); track hmo.id) {
                        <mat-option [value]="hmo.id">
                            {{ hmo.short_name }}
                        </mat-option>
                    }
                </mat-select>
            </mat-form-field>
        </div>

        @if (loading_hmos()) {
            <div class="loading-row">
                <mat-spinner diameter="30"></mat-spinner>
                <span>Loading HMOs...</span>
            </div>
        }


        @if (hmo_billing_report(); as ds) {
            @if (ds.length === 0) {
                <p>No Utilization Report Rows.</p>
            } @else {
                <app-generic-data-table
                    [columnDefs]="HMOBillingReportColumns"
                    [data]="ds"
                    [pageSize]="20"
                    [pageSizeOptions]="[10, 20,25, 50, 100]"
                />
            }
        }
        <button
            mat-raised-button
            color="primary"
            class="downlload-excel-button"
            [disabled]="selected_hmo_id() === null || hmo_billing_report().length === 0"
            (click)="downloadExcel()"
        >
            <mat-icon>download</mat-icon>
            Download Excel
        </button>

    </mat-card-content>
</mat-card>
