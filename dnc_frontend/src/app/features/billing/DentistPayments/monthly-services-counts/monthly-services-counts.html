<mat-card class="setup-card">
    <mat-card-header class="card-header-center">
        <div class="title-block">
            <mat-card-title class="mat-headline-1">Dentists on Flat Fee contract</mat-card-title>
            <mat-card-subtitle>Flat Fee Dentists Services Counts</mat-card-subtitle>
        </div>
    </mat-card-header>

    <mat-card-content>
        @if (data(); as ds){
            @if (ds.length === 0) {
                <p>No dentists found.</p>
            } @else {
                <div class="table-scroll-wrapper">
                    <app-generic-data-table
                        [columnDefs]="columns()"
                        [data]="ds"
                        [showAddButton]="false">
                    </app-generic-data-table>
                </div>
            }
        }
    </mat-card-content>
</mat-card>
