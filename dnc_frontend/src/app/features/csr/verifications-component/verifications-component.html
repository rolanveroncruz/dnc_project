<mat-card class="setup-card">
    <mat-card-header class="card-header-center">
        <div class="title-block">
            <mat-card-title class="mat-headline-1">Verifications</mat-card-title>
            <mat-card-subtitle>Manage dentists and view details</mat-card-subtitle>
        </div>
        <div class="header-actions">
            <button mat-flat-button type="button" (click)="onNewVerification()">
                New Verification
            </button>
        </div>
    </mat-card-header>

    <mat-card-content>
        @if (verifications(); as ds){
            @if (ds.length === 0) {
                <p>No verifications found.</p>
            } @else {
                <app-generic-data-table
                    [columnDefs]="columns"
                    [data]="ds"
                    [showAddButton]="false"
                    [hideSecondaryAction]="isSecondaryActionHidden"
                    (primaryActionClicked)="onClickActionButton($event)"
                    [secondaryActionLabel]="'Cancel'"
                    [secondaryActionIcon]="'cancel'"
                    (secondaryActionClicked)="onCancelVerification($event)"
                >

                </app-generic-data-table>
            }
        }
    </mat-card-content>
</mat-card>
