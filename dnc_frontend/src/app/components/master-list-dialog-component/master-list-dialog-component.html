<div class="master-list-dialog">
    <div class="dialog-header">
        <div>
            <h2 mat-dialog-title>Master List Members</h2>
            <div class="subtitle">{{ rows.length }} record(s)</div>
        </div>

        <button
            mat-stroked-button
            type="button"
            class="close-btn"
            (click)="close()"
        >
            Close
        </button>
    </div>

    <div class="table-wrapper" (click)="onTableClick($event)">
        <app-generic-data-table
            [data]="rows"
            [columnDefs]="columnDefs"
            [showAddButton]="false"
            [showHeaderFilters]="true"
            [pageSize]="15"
            [pageSizeOptions]="[5, 10, 15, 25, 50, 100]"
        >
        </app-generic-data-table>
    </div>
</div>
